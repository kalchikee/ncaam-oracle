name: Preseason Setup

on:
  schedule:
    - cron: '0 14 1 10 *'  # October 1st at 10 AM ET (2 PM UTC)
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to initialize (e.g. 2025-26)'
        required: false
        default: ''

jobs:
  preseason-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install scikit-learn numpy pandas requests

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch historical data and train ML model
        run: |
          echo "Fetching historical game data (2018–2025)..."
          python python/fetch_historical.py

          echo "Training logistic regression meta-model..."
          python python/train_model.py
        env:
          LOG_LEVEL: info

      - name: Commit model weights to repository
        run: |
          git config --global user.name 'NCAAM Oracle Bot'
          git config --global user.email 'ncaam-oracle@github-actions'
          git add model/ config/prior_year.json || true
          git diff --staged --quiet || git commit -m "chore: update model weights for new season [skip ci]"
          git push || true

      - name: Initialize fresh database and send online alert
        run: |
          echo "Initializing fresh SQLite database..."
          node --loader ts-node/esm src/index.ts --alert preseason
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: info
          CI: 'true'

      - name: Save fresh SQLite database
        uses: actions/cache/save@v4
        with:
          path: data/oracle.sqlite
          key: ncaam-oracle-db-${{ github.run_id }}
