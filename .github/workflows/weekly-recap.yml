name: Weekly Recap

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday 10 AM ET / 2 PM UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Reference date for recap (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  weekly-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Restore SQLite database
        uses: actions/cache@v4
        with:
          path: data/oracle.sqlite
          key: ncaam-oracle-db-${{ github.run_id }}
          restore-keys: |
            ncaam-oracle-db-

      - name: Install Node dependencies
        run: npm ci

      - name: Send weekly recap to Discord
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.date }}"
          else
            TARGET_DATE=$(date -u +%Y-%m-%d)
          fi
          echo "Sending weekly recap for week containing $TARGET_DATE"
          node --loader ts-node/esm src/index.ts --alert weekly --date "$TARGET_DATE"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: info
          CI: 'true'

      - name: Save SQLite database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/oracle.sqlite
          key: ncaam-oracle-db-${{ github.run_id }}
